# alembic.ini
# ---------------------------------------------------------------
# Alembic configuration for database migrations.
# Use Alembic in production instead of Base.metadata.create_all()
# ---------------------------------------------------------------

[alembic]
script_location = alembic
prepend_sys_path = .

# The DB URL is read dynamically from env in alembic/env.py
# so this placeholder is never actually used.
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S